name: build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  PACKER_VERSION: 1.15.4
  # Frozen Ubuntu archive snapshot (snapshot.ubuntu.com) that pins apt package
  # versions for reproducible builds. Bump deliberately to take package updates.
  APT_SNAPSHOT: "20250601T000000Z"

jobs:
  setup:
    runs-on: ubuntu-24.04
    outputs:
      images: ${{ steps.gen.outputs.images }}
      timestamp: ${{ steps.gen.outputs.timestamp }}
      gitref: ${{ steps.gen.outputs.gitref }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - id: gen
        run: |
          echo "images=$(jq -c . images.json)" >> "$GITHUB_OUTPUT"
          echo "timestamp=$(date -u +%Y%m%d%H%M)" >> "$GITHUB_OUTPUT"
          echo "gitref=${GITHUB_SHA:0:7}" >> "$GITHUB_OUTPUT"

  build:
    needs: setup
    runs-on: ubuntu-24.04
    name: ${{ matrix.image.version }}-${{ matrix.image.arch }}-${{ matrix.flavor }}
    strategy:
      fail-fast: false
      matrix:
        image: ${{ fromJSON(needs.setup.outputs.images) }}
        flavor: [base, full]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # GHA runners expose /dev/kvm but gate it behind the kvm group, which the
      # runner user is not a member of. This udev rule opens the device so qemu
      # can use -accel kvm without sudo. Standard recipe (actions/runner-images#8542).
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Install QEMU and Packer
        run: |
          # Pin apt to the Ubuntu archive snapshot for reproducible package
          # versions. The runner's mirror does not serve snapshots (only
          # snapshot.ubuntu.com does), so point apt there and drop the defaults.
          sudo rm -f /etc/apt/sources.list /etc/apt/sources.list.d/*
          printf 'Types: deb\nURIs: https://snapshot.ubuntu.com/ubuntu/%s\nSuites: noble noble-updates noble-security\nComponents: main restricted universe multiverse\nSigned-By: /usr/share/keyrings/ubuntu-archive-keyring.gpg\n' "$APT_SNAPSHOT" | sudo tee /etc/apt/sources.list.d/snapshot.sources >/dev/null
          sudo apt-get update
          sudo apt-get install -y qemu-system-x86 qemu-utils pigz netcat-openbsd
          wget -q "https://releases.hashicorp.com/packer/${PACKER_VERSION}/packer_${PACKER_VERSION}_linux_amd64.zip"
          sudo unzip -o "packer_${PACKER_VERSION}_linux_amd64.zip" -d /usr/local/bin
          packer version

      - name: Cache OpenBSD ISO
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: packer_cache
          key: openbsd-iso-${{ matrix.image.version }}-${{ matrix.image.arch }}-${{ matrix.image.iso_checksum }}

      - name: Build image
        env:
          PACKER_CACHE_DIR: packer_cache
        run: |
          make build \
            VER="${{ matrix.image.version }}" \
            ARCH="${{ matrix.image.arch }}" \
            FLAVOR="${{ matrix.flavor }}" \
            ACCEL=kvm \
            ISO_CHECKSUM="${{ matrix.image.iso_checksum }}"

      - name: Smoke test image
        run: |
          make smoke \
            VER="${{ matrix.image.version }}" \
            ARCH="${{ matrix.image.arch }}" \
            FLAVOR="${{ matrix.flavor }}" \
            ACCEL=kvm

      - name: Compress image
        if: ${{ success() && github.event_name == 'workflow_dispatch' }}
        run: |
          make compress \
            VER="${{ matrix.image.version }}" \
            ARCH="${{ matrix.image.arch }}" \
            FLAVOR="${{ matrix.flavor }}"

      - name: Upload artifacts
        if: ${{ success() && github.event_name == 'workflow_dispatch' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: openbsd-${{ matrix.image.version }}-${{ matrix.image.arch }}-${{ matrix.flavor }}
          path: output/build/${{ matrix.image.arch }}/${{ matrix.image.version }}/${{ matrix.flavor }}/*.img.gz
          if-no-files-found: error

  release:
    needs: [setup, build]
    if: ${{ github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      id-token: write
      attestations: write
    env:
      GH_TOKEN: ${{ github.token }}
      TS: ${{ needs.setup.outputs.timestamp }}
      GITREF: ${{ needs.setup.outputs.gitref }}
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: dist
          merge-multiple: true

      - name: Stamp assets
        run: |
          cd dist
          for f in *.img.gz; do
            mv "$f" "${f%.img.gz}-${GITREF}-${TS}.img.gz"
          done

      - name: Attest build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: dist/*.img.gz

      - name: Publish release
        run: |
          gh release create "$TS" dist/*.img.gz \
            --repo "$GITHUB_REPOSITORY" \
            --target "$GITHUB_SHA" \
            --title "OpenBSD images $TS" \
            --notes "OpenBSD cloud images built from commit \`$GITREF\`"
