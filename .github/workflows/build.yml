name: build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  PACKER_VERSION: 1.15.4

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      images: ${{ steps.gen.outputs.images }}
      timestamp: ${{ steps.gen.outputs.timestamp }}
      gitref: ${{ steps.gen.outputs.gitref }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - id: gen
        run: |
          echo "images=$(jq -c . images.json)" >> "$GITHUB_OUTPUT"
          echo "timestamp=$(date -u +%Y%m%d%H%M)" >> "$GITHUB_OUTPUT"
          echo "gitref=${GITHUB_SHA:0:7}" >> "$GITHUB_OUTPUT"

  build:
    needs: setup
    runs-on: ubuntu-latest
    name: ${{ matrix.image.version }}-${{ matrix.image.arch }}-${{ matrix.flavor }}
    strategy:
      fail-fast: false
      matrix:
        image: ${{ fromJSON(needs.setup.outputs.images) }}
        flavor: [base, full]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Install QEMU and Packer
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-system-x86 qemu-utils zstd
          wget -q "https://releases.hashicorp.com/packer/${PACKER_VERSION}/packer_${PACKER_VERSION}_linux_amd64.zip"
          sudo unzip -o "packer_${PACKER_VERSION}_linux_amd64.zip" -d /usr/local/bin
          packer version

      - name: Cache OpenBSD ISO
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: packer_cache
          key: openbsd-iso-${{ matrix.image.version }}-${{ matrix.image.arch }}-${{ matrix.image.iso_checksum }}

      - name: Build image
        env:
          PACKER_CACHE_DIR: packer_cache
        run: |
          make build \
            VER="${{ matrix.image.version }}" \
            ARCH="${{ matrix.image.arch }}" \
            FLAVOR="${{ matrix.flavor }}" \
            ACCEL=kvm \
            ISO_CHECKSUM="${{ matrix.image.iso_checksum }}"

      - name: Smoke test image
        run: |
          make smoke \
            VER="${{ matrix.image.version }}" \
            ARCH="${{ matrix.image.arch }}" \
            FLAVOR="${{ matrix.flavor }}" \
            ACCEL=kvm

      - name: Upload artifacts
        if: ${{ success() && (github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch') }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: openbsd-${{ matrix.image.version }}-${{ matrix.image.arch }}-${{ matrix.flavor }}
          path: output/${{ matrix.flavor }}/*.img.zst
          if-no-files-found: error

  release:
    needs: [setup, build]
    if: ${{ github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    env:
      GH_TOKEN: ${{ github.token }}
      TS: ${{ needs.setup.outputs.timestamp }}
      GITREF: ${{ needs.setup.outputs.gitref }}
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: dist
          merge-multiple: true

      - name: Stamp assets
        run: |
          cd dist
          for f in *.img.zst; do
            mv "$f" "${f%.img.zst}-${GITREF}-${TS}.img.zst"
          done

      - name: Attest build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: dist/*.img.zst

      - name: Publish release
        run: |
          gh release create "$TS" dist/*.img.zst \
            --repo "$GITHUB_REPOSITORY" \
            --target "$GITHUB_SHA" \
            --title "OpenBSD images $TS" \
            --notes "OpenBSD cloud images built from commit \`$GITREF\`"
